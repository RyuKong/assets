<?xml version="1.0" standalone="no"?>
<svg id="cloudberg-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
                <defs>
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="2" result="blur"/>
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                    
                    <!-- 科技感渐变文字颜色 (适配暗色背景) -->
                    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#ffffff"/>
                        <stop offset="50%" stop-color="#e0f2fe"/>
                        <stop offset="100%" stop-color="#7dd3fc"/>
                    </linearGradient>
                </defs>

                <g>
                    <!-- ================= 水面之上：纯净几何云朵 ================= -->
                    <g stroke="#ffffff" stroke-width="0.5" stroke-linejoin="round">
                        <polygon points="20,100 30,70 60,100" fill="#FFFFFF"/>
                        <polygon points="30,70 70,55 60,100" fill="#F0F8FF"/>
                        <polygon points="60,100 70,55 100,100" fill="#E1EFFE"/>
                        <polygon points="70,55 100,70 100,100" fill="#C3DDFD"/>
                        <polygon points="70,55 85,25 100,70" fill="#FFFFFF"/>
                        <polygon points="85,25 125,35 100,70" fill="#F0F8FF"/>
                        <polygon points="100,70 125,35 135,60" fill="#E1EFFE"/>
                        <polygon points="100,100 100,70 135,60" fill="#A4CAFE"/>
                        <polygon points="100,100 135,60 140,100" fill="#76A9FA"/>
                        <polygon points="135,60 170,75 140,100" fill="#C3DDFD"/>
                        <polygon points="140,100 170,75 180,100" fill="#E1EFFE"/>
                    </g>

                    <!-- ================= 水面分割线 ================= -->
                    <line x1="15" y1="100" x2="185" y2="100" stroke="#00E5FF" stroke-width="2" opacity="0.8"/>

                    <!-- ================= 水面之下：数据晶体冰山 ================= -->
                    <g stroke="#48CAE4" stroke-width="0.5" stroke-opacity="0.4" stroke-linejoin="round">
                        <polygon points="20,100 60,100 40,130" fill="#48CAE4"/>
                        <polygon points="60,100 75,150 40,130" fill="#00B4D8"/>
                        <polygon points="60,100 100,100 75,150" fill="#90E0EF"/>
                        <polygon points="100,100 125,145 75,150" fill="#0096C7"/>
                        <polygon points="100,100 140,100 125,145" fill="#0077B6"/>
                        <polygon points="140,100 160,125 125,145" fill="#023E8A"/>
                        <polygon points="140,100 180,100 160,125" fill="#03045E"/>
                        
                        <polygon points="40,130 75,150 90,175" fill="#0077B6"/>
                        <polygon points="75,150 125,145 90,175" fill="#023E8A"/>
                        <polygon points="125,145 135,165 90,175" fill="#03045E"/>
                        <polygon points="125,145 160,125 135,165" fill="#001D3D"/>
                        
                        <polygon points="40,130 90,175 110,195" fill="#0096C7"/>
                        <polygon points="90,175 135,165 110,195" fill="#023E8A"/>
                        <polygon points="160,125 135,165 110,195" fill="#001D3D"/>
                    </g>

                    <!-- ================= 科技网络节点 ================= -->
                    <g fill="#00E5FF">
                        <circle cx="40" cy="130" r="1.5"/>
                        <circle cx="75" cy="150" r="2"/>
                        <circle cx="125" cy="145" r="1.5"/>
                        <circle cx="160" cy="125" r="1.5"/>
                        <circle cx="90" cy="175" r="2"/>
                        <circle cx="135" cy="165" r="2"/>
                        <circle cx="110" cy="195" r="3" fill="#FFFFFF" filter="url(#glow)"/>
                    </g>
                    
                    <!-- ================= 品牌文字 (嵌入到 SVG 中) ================= -->
                    <text x="200" y="135" font-family="'Arial Black', 'Segoe UI Black', -apple-system, sans-serif" font-size="100" font-weight="900" letter-spacing="4" fill="url(#text-gradient)">CLOUDBERG</text>
                </g>
            </svg>